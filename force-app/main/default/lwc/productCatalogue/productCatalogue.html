<template>
    <lightning-card title="Product Catalogue" icon-name="standard:product">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button-icon 
                    icon-name="utility:list" 
                    value="list" 
                    onclick={handleViewChange} 
                    variant={isListView}
                    tooltip="List View">
                </lightning-button-icon>
                <lightning-button-icon 
                    icon-name="utility:apps" 
                    value="card" 
                    onclick={handleViewChange} 
                    variant={isCardView}
                    tooltip="Card View">
                </lightning-button-icon>
            </lightning-button-group>
            <lightning-button 
                label="New Product" 
                variant="brand" 
                icon-name="utility:add" 
                onclick={handleNewProduct} 
                class="slds-m-left_small">
            </lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <!-- Filter Section -->
            <div class="slds-grid slds-gutters slds-vertical-align-end slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-4">
                    <lightning-combobox
                        name="category"
                        label="Filter by Category"
                        value={selectedCategory}
                        options={categoryOptions}
                        onchange={handleCategoryChange}>
                    </lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-4">
                    <lightning-input 
                        type="toggle" 
                        label="Show Inactive Products" 
                        checked={includeInactive} 
                        onchange={handleInactiveToggle}
                        message-toggle-active="Yes"
                        message-toggle-inactive="No">
                    </lightning-input>
                </div>
            </div>

            <!-- Content Section -->
            <template if:true={hasProducts}>
                <!-- List View -->
                <template if:true={isListView}>
                    <div style="height: 400px;">
                        <c-product-datatable
                            key-field="Id"
                            data={products}
                            columns={columns}
                            hide-checkbox-column
                            onsort={handleSort}
                            sorted-by={sortBy}
                            sorted-direction={sortDirection}
                            onrowaction={handleRowAction}
                            ontogglestatus={handleInlineToggle}>
                        </c-product-datatable>
                    </div>
                </template>

                <!-- Card View -->
                <template if:true={isCardView}>
                    <div class="slds-scrollable_y slds-p-right_x-small" style="height: 400px;">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <template for:each={products} for:item="product">
                            <div key={product.Id} class="slds-col slds-size_1-of-3 slds-m-bottom_medium">
                                <article class="slds-card slds-card_boundary product-card">
                                    <template if:true={product.imageUrl}>
                                        <div class="product-image-container slds-p-horizontal_small slds-p-top_small">
                                            <img src={product.imageUrl} alt={product.Name} style="height: 150px; width: 100%; object-fit: contain; border-radius: 4px; border: 1px solid #ddd;"/>
                                        </div>
                                    </template>
                                    <div class="slds-card__header slds-grid">
                                        <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                            <div class="slds-media__figure">
                                                <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
                                            </div>
                                            <div class="slds-media__body">
                                                <h2 class="slds-card__header-title">
                                                    <span>{product.Name}</span>
                                                </h2>
                                            </div>
                                            <div class="slds-no-flex">
                                                <lightning-input 
                                                    type="toggle" 
                                                    label="Active" 
                                                    checked={product.Active__c} 
                                                    variant="label-hidden"
                                                    data-id={product.Id}
                                                    onchange={handleToggleCard}
                                                    class="slds-m-right_x-small slds-show_inline-block">
                                                </lightning-input>
                                                <lightning-button-icon icon-name="utility:preview" variant="bare" data-action="view" data-id={product.Id} onclick={handleCardAction} class="slds-m-right_xx-small" title="View Detail"></lightning-button-icon>
                                                <lightning-button-icon icon-name="utility:edit" variant="bare" data-action="edit" data-id={product.Id} onclick={handleCardAction} class="slds-m-right_xx-small" title="Edit"></lightning-button-icon>
                                                <lightning-button-icon icon-name="utility:delete" variant="bare" data-action="delete" data-id={product.Id} onclick={handleCardAction} title="Delete"></lightning-button-icon>
                                            </div>
                                        </header>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <div class="slds-grid slds-grid_vertical">
                                            <div class="slds-col">
                                                <span class="slds-text-title_caps">Category:</span>
                                                <span class="slds-m-left_x-small">{product.Category__c}</span>
                                            </div>
                                            <div class="slds-col slds-m-top_x-small">
                                                <span class="slds-text-title_caps">Price:</span>
                                                <span class="slds-m-left_x-small">
                                                    <lightning-formatted-number 
                                                        value={product.Unit_Price__c} 
                                                        format-style="currency" 
                                                        currency-code="AUD">
                                                    </lightning-formatted-number>
                                                </span>
                                            </div>
                                            <div class="slds-col slds-m-top_x-small">
                                                <p class="slds-text-body_small slds-truncate" title={product.Description__c}>
                                                    {product.Description__c}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </article>
                            </div>
                        </template>
                        </div>
                    </div>
                </template>
            </template>

            <!-- Empty State -->
            <template if:false={hasProducts}>
                <div class="slds-illustration slds-illustration_small slds-m-top_large slds-m-bottom_large">
                    <img src="/img/chatter/Desert.svg" class="slds-illustration__svg" alt="No Products Found"/>
                    <div class="slds-text-longform slds-text-color_error">
                        <h3 class="slds-text-heading_medium">No products found for this criteria</h3>
                        <p class="slds-text-body_regular" if:true={selectedCategory}>
                            We couldn't find any products matching the <b>{selectedCategory}</b> category. 
                            Try clearing your filters or viewing inactive products.
                        </p>
                        <p class="slds-text-body_regular" if:false={selectedCategory}>
                            It looks like there aren't any active products yet! 
                            Try toggling "Show Inactive Products" or adding a new one.
                        </p>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>

    <!-- Edit Modal -->
    <template if:true={isEditing}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeEditModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Edit Product</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form record-id={editRecordId} object-api-name="Product__c" onsuccess={handleEditSuccess}>
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Product_Image_Id__c" class="slds-hide"></lightning-input-field>
                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Category__c"></lightning-input-field>
                        <lightning-input-field field-name="Unit_Price__c"></lightning-input-field>
                        <lightning-input-field field-name="Active__c"></lightning-input-field>
                        <lightning-input-field field-name="Description__c"></lightning-input-field>
                        
                        <div class="slds-m-top_medium slds-p-around_small slds-theme_shade slds-border_all" style="border-radius: 4px;">
                            <label class="slds-form-element__label">Product Image</label>
                            <lightning-file-upload
                                label=""
                                name="fileUploader"
                                accept={acceptedFormats}
                                record-id={editRecordId}
                                onuploadfinished={handleUploadFinished}
                                multiple="false">
                            </lightning-file-upload>
                        </div>

                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button class="slds-m-right_small" label="Cancel" onclick={closeEditModal}></lightning-button>
                            <lightning-button type="submit" variant="brand" label="Save"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create Modal -->
    <template if:true={isCreating}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeCreateModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Create New Product</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:false={isCreatingStep2}>
                        <lightning-record-edit-form object-api-name="Product__c" onsuccess={handleCreateSuccess}>
                            <lightning-messages></lightning-messages>
                            <lightning-input-field field-name="Name"></lightning-input-field>
                            <lightning-input-field field-name="Category__c"></lightning-input-field>
                            <lightning-input-field field-name="Unit_Price__c"></lightning-input-field>
                            <lightning-input-field field-name="Active__c"></lightning-input-field>
                            <lightning-input-field field-name="Description__c"></lightning-input-field>
                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button class="slds-m-right_small" label="Cancel" onclick={closeCreateModal}></lightning-button>
                                <lightning-button type="submit" variant="brand" label="Next: Upload Image"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </template>
                    <template if:true={isCreatingStep2}>
                        <div class="slds-text-align_center slds-m-bottom_medium">
                            <h3 class="slds-text-heading_small slds-text-color_success slds-m-bottom_x-small">Product details saved!</h3>
                            <p>You can now upload a product image or finish the process.</p>
                        </div>
                        <div class="slds-p-around_medium slds-theme_shade slds-border_all slds-text-align_center" style="border-radius: 4px;">
                            <lightning-file-upload
                                label="Select Product Image"
                                name="fileUploader"
                                accept={acceptedFormats}
                                record-id={editRecordId}
                                onuploadfinished={handleCreateUploadFinished}
                                multiple="false">
                            </lightning-file-upload>
                        </div>
                        <div class="slds-m-top_medium slds-text-align_right">
                            <lightning-button variant="brand" label="Finish" onclick={closeCreateModal}></lightning-button>
                        </div>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
